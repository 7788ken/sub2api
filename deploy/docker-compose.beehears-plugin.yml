services:
  beehears-plugin:
    build:
      context: ./plugins/beehears-plugin
      dockerfile: Dockerfile
    container_name: beehears-plugin
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PLUGIN_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PLUGIN_PORT=3001
      - SUB2API_BASE_URL=http://sub2api:8080
      - SUB2API_ADMIN_TOKEN=${SUB2API_ADMIN_TOKEN:?SUB2API_ADMIN_TOKEN is required}
      - SUB2API_JOB_ROLLOVER_TOKEN=${SUB2API_JOB_ROLLOVER_TOKEN:?SUB2API_JOB_ROLLOVER_TOKEN is required}
      - BETA_PASSWORD=${BETA_PASSWORD:-}
      - PLUGIN_ALLOWED_ORIGINS=${PLUGIN_ALLOWED_ORIGINS:-https://plugin1.beehears.com,https://coding.beehears.com}
      - PLUGIN_SESSION_TTL_MS=${PLUGIN_SESSION_TTL_MS:-300000}
      - BETA_RATE_LIMIT_WINDOW_MS=${BETA_RATE_LIMIT_WINDOW_MS:-300000}
      - BETA_RATE_LIMIT_MAX_ATTEMPTS=${BETA_RATE_LIMIT_MAX_ATTEMPTS:-8}
      - ADMIN_USER_IDS=${ADMIN_USER_IDS:-1}
      - DB_HOST=sub2api-postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-sub2api}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - DB_NAME=${POSTGRES_DB:-sub2api}
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  sub2api-network:
    external: true
    name: sub2api-deploy_sub2api-network
